version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      rust-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "rand"
          - "rand_chacha"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
